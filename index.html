<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional OMR Evaluator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --key-color: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        /* Configuration Card */
        .setup-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .input-row { display: flex; gap: 15px; justify-content: center; margin: 15px 0; }
        .input-group { text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; font-weight: 600; }
        
        input {
            background: #0f172a;
            border: 1px solid var(--border);
            padding: 10px;
            color: white;
            border-radius: 6px;
            width: 100px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        /* The Sheet Layout */
        .omr-sheet {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden; /* Important for header radius */
            display: none;
        }

        /* STICKY HEADER - Fixes your tracking problem */
        .sheet-header {
            position: sticky;
            top: 0;
            background: #1e293b;
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            padding: 15px;
            border-bottom: 2px solid var(--border);
            z-index: 100;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            padding: 15px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        /* Zebra Striping for easy eye tracking */
        .row:nth-child(even) { background: rgba(255, 255, 255, 0.03); }

        .q-num { font-weight: 800; color: #64748b; font-size: 18px; }

        .bubble-box { display: flex; gap: 8px; justify-content: center; }

        /* Bubble Styling */
        .bubble { position: relative; width: 36px; height: 36px; }
        .bubble input { position: absolute; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 2; }
        .bubble span {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 2px solid;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            transition: 0.2s;
        }

        /* Your Choice Bubbles (Blue) */
        .user-col span { border-color: var(--primary); color: var(--primary); }
        .user-col input:checked + span { background: var(--primary); color: white; }

        /* Correct Key Bubbles (Amber) */
        .key-col span { border-color: var(--key-color); color: var(--key-color); }
        .key-col input:checked + span { background: var(--key-color); color: white; }

        /* Result Section */
        .footer-actions { padding: 30px; text-align: center; }
        #resultDisplay {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            display: none;
        }

        @media (max-width: 600px) {
            .sheet-header, .row { grid-template-columns: 50px 1fr 1fr; padding: 10px 5px; }
            .bubble { width: 30px; height: 30px; }
            .bubble-box { gap: 4px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">OMR Evaluator</h1>
            <p style="color: #94a3b8;">Fill your choices and the correct key to calculate marks.</p>
        </header>

        <section class="setup-card">
            <div class="input-row">
                <div class="input-group">
                    <label>Start No.</label>
                    <input type="number" id="startNo" value="1">
                </div>
                <div class="input-group">
                    <label>Total Questions</label>
                    <input type="number" id="totalQty" value="10">
                </div>
            </div>
            <button class="btn" onclick="generateSheet()">Generate OMR Sheet</button>
        </section>

        <form id="omrForm">
            <div id="omrSheet" class="omr-sheet">
                <div class="sheet-header">
                    <div>No.</div>
                    <div style="text-align: center; color: var(--primary);">Your Choice</div>
                    <div style="text-align: center; color: var(--key-color);">Correct Key</div>
                </div>
                <div id="questionsContainer"></div>
                
                <div class="footer-actions">
                    <button type="submit" class="btn" style="background: var(--success); font-size: 18px; width: 250px;">Calculate Result</button>
                    
                    <div id="resultDisplay">
                        <h2 id="finalScore" style="font-size: 40px; color: var(--success);">0 / 0</h2>
                        <p id="accuracy" style="color: #94a3b8; font-weight: 600;"></p>
                        <button type="button" class="btn" style="margin-top: 15px; background: #475569;" onclick="window.location.reload()">Reset Sheet</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        function generateSheet() {
            const start = parseInt(document.getElementById('startNo').value) || 1;
            const qty = parseInt(document.getElementById('totalQty').value);
            const container = document.getElementById('questionsContainer');

            if (!qty || qty < 1) return alert("Please enter total questions");

            container.innerHTML = '';
            for (let i = 0; i < qty; i++) {
                const qNum = start + i;
                const row = document.createElement('div');
                row.className = 'row';
                
                row.innerHTML = `
                    <div class="q-num">${qNum}</div>
                    <div class="bubble-box user-col">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <label class="bubble">
                                <input type="radio" name="u_${qNum}" value="${opt}" required>
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                    <div class="bubble-box key-col">
                        ${['A', 'B', 'C', 'D'].map(opt => `
                            <label class="bubble">
                                <input type="radio" name="k_${qNum}" value="${opt}" required>
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(row);
            }

            document.getElementById('omrSheet').style.display = 'block';
            document.querySelector('.setup-card').style.display = 'none';
        }

        document.getElementById('omrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            let correct = 0;
            let total = 0;

            // Using a Map-like approach to find pairs
            const results = {};
            for (let [key, value] of Object.entries(data)) {
                const [type, num] = key.split('_');
                if (!results[num]) results[num] = {};
                results[num][type] = value;
            }

            for (let num in results) {
                total++;
                if (results[num].u === results[num].k) {
                    correct++;
                }
            }

            const resDiv = document.getElementById('resultDisplay');
            document.getElementById('finalScore').textContent = `${correct} / ${total}`;
            document.getElementById('accuracy').textContent = `Accuracy: ${Math.round((correct/total)*100)}%`;
            resDiv.style.display = 'block';
            resDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
