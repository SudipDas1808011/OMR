<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic OMR System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Blobs */
        .background-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.3;
        }
        .blob { position: absolute; border-radius: 50%; }
        .blob-1 { width: 400px; height: 400px; background: #4f46e5; top: -100px; right: -100px; }
        .blob-2 { width: 300px; height: 300px; background: #7c3aed; bottom: -50px; left: -50px; }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .app-layout {
                grid-template-columns: 350px 1fr;
                height: 100vh;
                padding: 2rem;
            }
            .sidebar { overflow-y: auto; padding-right: 1rem; }
            .content { overflow-y: auto; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.5rem; color: #fff; }
        .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1.5rem; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; font-weight: 600; }
        
        input[type="number"], input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 0.6rem;
            padding: 0.8rem;
            color: #fff;
            font-size: 1rem;
        }

        .primary-btn, .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .primary-btn:hover { background: var(--primary-hover); }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .question-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .options-group { display: flex; gap: 0.5rem; }

        .omr-bubble {
            position: relative;
            width: 32px;
            height: 32px;
            cursor: pointer;
        }

        .omr-bubble input { opacity: 0; position: absolute; }

        .omr-bubble span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .omr-bubble input:checked + span {
            background: var(--primary);
            color: white;
        }

        .hidden { display: none !important; }
        
        #scoreBoard { text-align: center; }
        .score-num { font-size: 3rem; font-weight: 800; color: var(--success); }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="card">
                <h1>Dynamic OMR</h1>
                <p class="subtitle">Evaluate Your Performance</p>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Start No.</label>
                        <input type="number" id="startNumber" value="1">
                    </div>
                    <div class="input-group">
                        <label>Quantity</label>
                        <input type="number" id="lastNumber" placeholder="Total Qs">
                    </div>
                </div>
                <button id="generateBtn" class="primary-btn">1. Create Sheet</button>
            </div>

            <div id="answerKeyCard" class="card hidden">
                <h3 style="margin-bottom: 0.5rem;">2. Define Key</h3>
                <p class="subtitle">Enter correct answers (e.g., ABCD...)</p>
                <input type="text" id="correctKey" placeholder="Sequence of answers">
                <p style="font-size: 0.7rem; margin-top: 0.5rem; color: var(--warning);">Note: Submit your sheet first!</p>
            </div>

            <div id="results" class="card hidden">
                <div id="scoreBoard">
                    <p class="subtitle">Your Result</p>
                    <div class="score-num" id="score">0</div>
                    <p id="accuracyText"></p>
                </div>
            </div>
        </aside>

        <main id="omrSection" class="content hidden">
            <form id="omrForm" class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>OMR Sheet</h2>
                    <button type="submit" class="submit-btn" style="width: auto; padding: 0.5rem 1.5rem;">Submit Answers</button>
                </div>
                <div id="questionsContainer" class="questions-grid"></div>
            </form>
        </main>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const omrSection = document.getElementById('omrSection');
        const questionsContainer = document.getElementById('questionsContainer');
        const omrForm = document.getElementById('omrForm');
        const answerKeyCard = document.getElementById('answerKeyCard');
        const resultsCard = document.getElementById('results');
        
        let userChoices = {};

        generateBtn.addEventListener('click', () => {
            const start = parseInt(document.getElementById('startNumber').value) || 1;
            const count = parseInt(document.getElementById('lastNumber').value);

            if (!count) return alert("Enter question quantity");

            questionsContainer.innerHTML = '';
            for (let i = start; i < (start + count); i++) {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-item';
                let html = `<span style="font-weight:bold">${i}.</span><div class="options-group">`;
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    html += `<label class="omr-bubble"><input type="radio" name="q${i}" value="${opt}" required><span>${opt}</span></label>`;
                });
                qDiv.innerHTML = html + `</div>`;
                questionsContainer.appendChild(qDiv);
            }

            omrSection.classList.remove('hidden');
            answerKeyCard.classList.add('hidden');
            resultsCard.classList.add('hidden');
        });

        omrForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = new FormData(omrForm);
            userChoices = Object.fromEntries(data.entries());
            
            answerKeyCard.classList.remove('hidden');
            alert("Choices recorded! Now enter the correct answer key in the sidebar to see results.");
            answerKeyCard.scrollIntoView({behavior: 'smooth'});
        });

        document.getElementById('correctKey').addEventListener('input', function(e) {
            const key = e.target.value.toUpperCase().replace(/\s/g, '');
            const choicesArray = Object.values(userChoices);
            
            if (key.length === choicesArray.length && choicesArray.length > 0) {
                let correct = 0;
                choicesArray.forEach((choice, index) => {
                    if (choice === key[index]) correct++;
                });

                document.getElementById('score').textContent = `${correct} / ${choicesArray.length}`;
                document.getElementById('accuracyText').textContent = `Accuracy: ${Math.round((correct/choicesArray.length)*100)}%`;
                resultsCard.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
